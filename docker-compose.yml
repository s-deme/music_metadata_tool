services:
  app:
    build: .
    working_dir: /workspace
    volumes:
      - .:/workspace
      - type: bind
        source: ${MUSIC_SOURCE_DIR:-./music}
        target: /workspace/music
    tty: true
    stdin_open: true
    environment:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONPATH: "/workspace/src"
      PATH: "/workspace/bin:/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      MUSIC_METADATA_LOG_PATH: ${MUSIC_METADATA_LOG_PATH:-}
